<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pomodoro Timer</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ff6b6b; /* ポモドーロらしい赤 */
            color: white;
            transition: background-color 0.5s;
        }
        .container { text-align: center; }
        .timer { font-size: 8rem; font-weight: bold; margin-bottom: 20px; }
        .controls button {
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            background: white;
            color: #ff6b6b;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .controls button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="timer" id="display">25:00</div>
    <div class="controls">
        <button id="startBtn" onclick="toggleTimer()">START</button>
    </div>
</div>

<script>
    let timeLeft = 25 * 60;
    let timerId = null;

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('display').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            btn.innerText = "START";
        } else {
            btn.innerText = "STOP";
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("Time is up! お疲れ様でした。");
                }
            }, 1000);
        }
    }
</script>
</body>
</html>
