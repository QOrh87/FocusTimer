<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Tool Site</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .count { font-size: 3rem; margin: 1rem 0; color: #007bff; }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Counter Tool</h1>
        <div class="count" id="counter">0</div>
        <button onclick="increment()">Count Up!</button>
    </div>

    <script>
        // JavaScriptの動作チェック用
        let count = 0;
        const counterElement = document.getElementById('counter');

        function increment() {
            count++;
            counterElement.innerText = count;
            console.log("Current count: " + count);
        }
    </script>
</body>
</html>
